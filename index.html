<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#8B0000">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<title>Can Beyler</title>
<style>
:root{
  --primary:#8B0000;--accent:#ff6600;
  --bg:#0d0500;--bg2:#1a0800;--bg3:#240c00;
  --text:#f0e6d3;--muted:#887766;--border:#3a1a00;
  --green:#22aa44;--card:#1a0900;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}

/* ── HEADER ── */
.header{
  background:linear-gradient(135deg,#3a0000,var(--primary),#cc2200,var(--primary),#3a0000);
  padding:0 16px;display:flex;align-items:center;justify-content:space-between;
  min-height:64px;position:sticky;top:0;z-index:200;
  box-shadow:0 4px 24px rgba(139,0,0,.7);border-bottom:2px solid var(--accent);
}
.brand{display:flex;align-items:center;gap:10px}
.brand-ico{font-size:30px}
.brand-name{font-size:22px;font-weight:900;letter-spacing:2px;color:#fff}
.brand-tag{font-size:10px;color:#ffaa77;letter-spacing:2px}
.hdr-right{display:flex;align-items:center;gap:10px}

/* Telefon & WA butonları */
.icon-btn{
  width:42px;height:42px;border-radius:50%;border:none;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;text-decoration:none;
  transition:transform .2s,filter .2s;flex-shrink:0;
}
.icon-btn:hover{transform:scale(1.1)}
.btn-phone{background:rgba(34,170,68,.25);color:#44dd66}
.btn-wa{background:rgba(18,140,62,.25);color:#25d366}

/* Sepet butonu */
.cart-btn{
  position:relative;width:42px;height:42px;border-radius:50%;
  background:rgba(255,102,0,.2);border:1.5px solid var(--accent);
  color:var(--accent);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.cart-btn:hover{background:rgba(255,102,0,.35)}
.cart-badge{
  position:absolute;top:-4px;right:-4px;
  background:var(--accent);color:#fff;
  font-size:10px;font-weight:800;
  min-width:18px;height:18px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  padding:0 4px;
  display:none;
}

/* ── PROMO ── */
.promo{
  background:linear-gradient(90deg,#6a0000,#cc2200,#6a0000);
  text-align:center;padding:12px 16px;
  font-size:13px;font-weight:800;letter-spacing:1.5px;color:#fff;
  animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.9}50%{opacity:1}}

/* ── MAIN ── */
.main{max-width:960px;margin:0 auto;padding:24px 16px 100px}
.section-label{
  font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:3px;color:var(--accent);
  margin-bottom:16px;display:flex;align-items:center;gap:10px;
}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

/* ── MENU GRID ── */
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-bottom:32px}

.menu-card{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  overflow:hidden;transition:transform .25s,box-shadow .25s;
  display:flex;flex-direction:column;
}
.menu-card:hover{transform:translateY(-3px);box-shadow:0 12px 36px rgba(139,0,0,.3)}

.card-img-wrap{
  width:100%;height:160px;overflow:hidden;position:relative;
  background:linear-gradient(135deg,#1f0800,#0d0500);
  display:flex;align-items:center;justify-content:center;
}
.card-img{width:100%;height:100%;object-fit:cover;display:block}
.card-emoji-placeholder{font-size:70px;opacity:.7}

.card-body{padding:14px 16px;flex:1;display:flex;flex-direction:column}
.card-name{font-size:15px;font-weight:800;color:#fff;margin-bottom:5px;line-height:1.3}
.card-desc{font-size:11px;color:var(--muted);line-height:1.6;flex:1;margin-bottom:12px}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.card-price{font-size:20px;font-weight:900;color:var(--accent)}
.add-btn{
  background:linear-gradient(135deg,var(--primary),#cc2200);
  color:#fff;border:none;padding:8px 16px;border-radius:8px;
  font-size:13px;font-weight:700;cursor:pointer;transition:filter .2s;
}
.add-btn:hover{filter:brightness(1.2)}
.add-btn.added{background:linear-gradient(135deg,#1a6b1a,#2da32d)}

/* ── BİLGİ ── */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:32px}
@media(max-width:500px){.info-grid{grid-template-columns:1fr}}
.info-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:16px;display:flex;gap:12px;align-items:flex-start;
}
.info-ico{font-size:26px;flex-shrink:0}
.info-t{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:1px;margin-bottom:4px}
.info-v{font-size:12px;color:var(--muted);line-height:1.6}
.info-v a{color:var(--accent);text-decoration:none}

/* ── SEPET DRAWER ── */
.cart-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;
}
.cart-overlay.open{display:block}
.cart-drawer{
  position:fixed;right:0;top:0;bottom:0;width:min(360px,100vw);
  background:#160700;border-left:2px solid var(--primary);
  display:flex;flex-direction:column;z-index:501;
  transform:translateX(100%);transition:transform .3s ease;
}
.cart-drawer.open{transform:translateX(0)}

.cart-head{
  padding:18px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.cart-title{font-size:16px;font-weight:800;color:#fff}
.cart-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer}
.cart-close:hover{color:#fff}

.cart-items{flex:1;overflow-y:auto;padding:16px}
.cart-items::-webkit-scrollbar{width:4px}
.cart-items::-webkit-scrollbar-thumb{background:var(--primary);border-radius:2px}

.cart-empty{text-align:center;padding:40px 20px;color:var(--muted)}
.cart-empty-ico{font-size:48px;margin-bottom:12px}

.cart-item{
  display:flex;align-items:center;gap:12px;
  padding:12px;background:rgba(30,8,0,.8);
  border:1px solid var(--border);border-radius:10px;margin-bottom:8px;
}
.ci-emoji{font-size:28px;flex-shrink:0}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:13px;font-weight:700;color:#fff;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-price{font-size:12px;color:var(--accent)}
.ci-qty{display:flex;align-items:center;gap:6px;flex-shrink:0}
.qty-btn{
  width:26px;height:26px;border-radius:50%;
  border:1px solid #3a1a00;background:rgba(0,0,0,.4);
  color:#fff;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .2s;
}
.qty-btn:hover{background:var(--primary)}
.qty-num{font-size:14px;font-weight:700;color:#fff;min-width:20px;text-align:center}

.cart-foot{padding:16px;border-top:1px solid var(--border);flex-shrink:0}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cart-total-label{font-size:13px;color:var(--muted)}
.cart-total-val{font-size:22px;font-weight:900;color:var(--accent)}
.checkout-btn{
  width:100%;padding:15px;
  background:linear-gradient(135deg,#128c3e,#1aad52);
  border:none;border-radius:12px;color:#fff;
  font-size:16px;font-weight:800;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:filter .2s;
}
.checkout-btn:hover{filter:brightness(1.12)}
.checkout-btn:disabled{background:#333;color:#555;cursor:not-allowed}
.clear-btn{
  width:100%;padding:9px;margin-top:8px;
  background:transparent;border:1px solid #333;border-radius:10px;
  color:#555;font-size:12px;cursor:pointer;transition:all .2s;
}
.clear-btn:hover{border-color:#aa2222;color:#aa2222}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--green);color:#fff;padding:11px 22px;border-radius:30px;
  font-size:13px;font-weight:700;opacity:0;transition:opacity .3s;
  z-index:9999;pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="brand">
    <div class="brand-ico">🍗</div>
    <div>
      <div class="brand-name" data-token="RESTAURANT_NAME">Can Beyler</div>
      <div class="brand-tag" data-token="TAGLINE">Kızarmış Piliç & Pilav</div>
    </div>
  </div>
  <div class="hdr-right">
    <button class="pwa-install-btn icon-btn" style="display:none;background:rgba(255,255,255,.1);color:#fff" title="Uygulamayı Yükle">📲</button>
    <a id="hdr-phone" href="#" class="icon-btn btn-phone" title="Ara">📞</a>
    <a id="hdr-wa" href="#" class="icon-btn btn-wa" target="_blank" title="WhatsApp">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
        <path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.878-1.42A9.94 9.94 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm0 18a8 8 0 01-4.184-1.188l-.3-.18-3.1.9.924-3.02-.196-.31A8 8 0 1112 20z"/>
      </svg>
    </a>
    <button class="cart-btn" id="cart-btn" onclick="openCart()">
      🛒
      <span class="cart-badge" id="cart-badge">0</span>
    </button>
  </div>
</header>

<!-- PROMO -->
<div class="promo" data-token="PROMO_TEXT">AÇILIŞA ÖZEL UYGUN FİYATLARLA HİZMETİNİZDEYİZ</div>

<main class="main">
  <div class="section-label">🍽️ Menümüz</div>

  <!-- MENU GRID -->
  <div class="menu-grid" id="menu-grid">
    <!-- JS doldurur -->
  </div>

  <!-- BİLGİ -->
  <div class="section-label">📍 Bilgiler</div>
  <div class="info-grid">
    <div class="info-card">
      <div class="info-ico">📞</div>
      <div>
        <div class="info-t">Telefon</div>
        <div class="info-v"><a id="info-phone" href="#">0533 639 97 06</a></div>
      </div>
    </div>
    <div class="info-card">
      <div class="info-ico">💬</div>
      <div>
        <div class="info-t">WhatsApp</div>
        <div class="info-v"><a id="info-wa" href="#" target="_blank">Mesaj Gönder</a></div>
      </div>
    </div>
    <div class="info-card">
      <div class="info-ico">📍</div>
      <div>
        <div class="info-t">Adres</div>
        <div class="info-v"><a id="info-maps" href="#" target="_blank" data-token="ADDRESS">—</a></div>
      </div>
    </div>
    <div class="info-card">
      <div class="info-ico">🕐</div>
      <div>
        <div class="info-t">Çalışma Saatleri</div>
        <div class="info-v">
          <span data-token="HOURS_1">—</span><br>
          <span data-token="HOURS_2">—</span>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- SEPET OVERLAY -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>

<!-- SEPET DRAWER -->
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-head">
    <div class="cart-title">🛒 Sepetiniz</div>
    <button class="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-foot">
    <div class="cart-total-row">
      <span class="cart-total-label">Toplam:</span>
      <span class="cart-total-val" id="cart-total-val">₺0</span>
    </div>
    <button class="checkout-btn" id="checkout-btn" onclick="checkout()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
        <path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.878-1.42A9.94 9.94 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm0 18a8 8 0 01-4.184-1.188l-.3-.18-3.1.9.924-3.02-.196-.31A8 8 0 1112 20z"/>
      </svg>
      WhatsApp ile Sipariş Ver
    </button>
    <button class="clear-btn" onclick="clearCartUI()">🗑️ Sepeti Temizle</button>
  </div>
</div>

<div id="toast"></div>

<script src="./app.js"></script>
<script>
// ── Init ─────────────────────────────────
const T   = getTokens();
const IMG = getImages();

applyTokensToDOM(T);

// Linkleri güncelle
const phone = T.PHONE.replace(/\D/g,'');
const wa    = T.WHATSAPP.replace(/\D/g,'');
const maps  = `https://maps.google.com/?q=${encodeURIComponent(T.MAPS_QUERY||T.ADDRESS)}`;

document.getElementById('hdr-phone').href  = `tel:${phone}`;
document.getElementById('hdr-wa').href     = `https://wa.me/${wa}`;
document.getElementById('info-phone').href = `tel:${phone}`;
document.getElementById('info-phone').textContent = T.PHONE;
document.getElementById('info-wa').href    = `https://wa.me/${wa}`;
document.getElementById('info-maps').href  = maps;

// ── Menü Kartlarını Oluştur ───────────────
const menuItems = [1,2,3,4].map(i => ({
  id    : `MENU_${i}`,
  name  : T[`MENU_${i}_NAME`],
  price : T[`MENU_${i}_PRICE`],
  desc  : T[`MENU_${i}_DESC`],
  emoji : T[`MENU_${i}_EMOJI`],
  img   : IMG[`MENU_${i}`] || null,
}));

const grid = document.getElementById('menu-grid');
menuItems.forEach(item => {
  const card = document.createElement('div');
  card.className = 'menu-card';
  card.innerHTML = `
    <div class="card-img-wrap">
      ${item.img
        ? `<img class="card-img" src="${item.img}" alt="${item.name}">`
        : `<div class="card-emoji-placeholder">${item.emoji}</div>`}
    </div>
    <div class="card-body">
      <div class="card-name">${item.name}</div>
      <div class="card-desc">${item.desc}</div>
      <div class="card-footer">
        <div class="card-price">₺${item.price}</div>
        <button class="add-btn" data-id="${item.id}">+ Ekle</button>
      </div>
    </div>`;
  card.querySelector('.add-btn').addEventListener('click', function(){
    addToCart({ id:item.id, name:item.name, price:item.price, emoji:item.emoji });
    renderCart();
    showToast(`${item.emoji} ${item.name} sepete eklendi`);
    this.textContent = '✓ Eklendi';
    this.classList.add('added');
    setTimeout(()=>{ this.textContent='+ Ekle'; this.classList.remove('added'); },1200);
  });
  grid.appendChild(card);
});

// ── Sepet ─────────────────────────────────
function renderCart(){
  const cart = getCart();
  const badge = document.getElementById('cart-badge');
  const total = cartTotal(cart);
  const count = cart.reduce((s,c)=>s+c.qty,0);

  badge.textContent = count;
  badge.style.display = count > 0 ? 'flex' : 'none';
  document.getElementById('cart-total-val').textContent = `₺${total.toFixed(0)}`;
  document.getElementById('checkout-btn').disabled = cart.length === 0;

  const itemsEl = document.getElementById('cart-items');
  if(cart.length === 0){
    itemsEl.innerHTML = `<div class="cart-empty"><div class="cart-empty-ico">🛒</div><div>Sepetiniz boş</div><div style="font-size:12px;color:#554433;margin-top:6px">Menüden ürün ekleyin</div></div>`;
    return;
  }
  itemsEl.innerHTML = cart.map(c=>`
    <div class="cart-item" data-id="${c.id}">
      <div class="ci-emoji">${c.emoji}</div>
      <div class="ci-info">
        <div class="ci-name">${c.name}</div>
        <div class="ci-price">₺${(parseFloat(c.price)*c.qty).toFixed(0)}</div>
      </div>
      <div class="ci-qty">
        <button class="qty-btn" data-action="dec" data-id="${c.id}">−</button>
        <span class="qty-num">${c.qty}</span>
        <button class="qty-btn" data-action="inc" data-id="${c.id}">+</button>
      </div>
    </div>`).join('');

  itemsEl.querySelectorAll('.qty-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=btn.dataset.id, action=btn.dataset.action;
      const cart=getCart(), item=cart.find(c=>c.id===id);
      if(!item) return;
      action==='inc' ? updateQty(id,item.qty+1) : updateQty(id,item.qty-1);
      renderCart();
    });
  });
}

function openCart(){
  document.getElementById('cart-overlay').classList.add('open');
  document.getElementById('cart-drawer').classList.add('open');
  renderCart();
}
function closeCart(){
  document.getElementById('cart-overlay').classList.remove('open');
  document.getElementById('cart-drawer').classList.remove('open');
}
function clearCartUI(){
  clearCart(); renderCart();
  showToast('Sepet temizlendi');
}
function checkout(){
  const cart = getCart();
  if(!cart.length) return;
  const url = buildWhatsAppOrderURL(cart, T);
  window.open(url,'_blank');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

renderCart();
</script>
</body>
</html>
